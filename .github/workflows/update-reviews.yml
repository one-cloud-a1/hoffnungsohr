name: Update Google reviews

on:
  schedule:
    - cron: '17 4 * * 2'   # wöchentlich dienstags ~04:17 UTC (06:17 MESZ)
  workflow_dispatch:        # manuell auslösbar (Actions-Tab → "Run workflow")

permissions:
  contents: write

concurrency:
  group: update-reviews
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bewertungen holen
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          PLACE_ID: ${{ vars.PLACE_ID }}     # optional; leer lassen = automatisch
        run: node scripts/fetch-reviews.mjs

      - name: Committen, falls geändert
        run: |
          if [ -n "$(git status --porcelain reviews.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add reviews.json
            git commit -m "chore: Google-Bewertungen aktualisiert [skip ci]"
            git push
          else
            echo "Keine Änderung an reviews.json."
          fi
